<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack Chiang | Professional Resume</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #004B87; --accent-teal: #00A3AD; --bg-light: #F8F9FA; --glass: rgba(255, 255, 255, 0.88); }
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background: var(--bg-light); margin: 0; color: #333; line-height: 1.6; }
        .hero { background: linear-gradient(135deg, var(--primary-blue), #002D52); height: 380px; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 24px; padding: 40px; max-width: 850px; width: 100%; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.3); }
        .container { max-width: 1000px; margin: -50px auto 60px; padding: 20px; }
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 18px; padding: 28px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); transition: 0.3s; border: 1px solid #eee; }
        .card:hover { transform: translateY(-8px); border-color: var(--accent-teal); }
        .timeline { border-left: 3px solid var(--accent-teal); margin: 20px 0 40px 10px; padding-left: 35px; }
        .timeline-item { position: relative; margin-bottom: 45px; }
        .timeline-item::before { content: ''; position: absolute; left: -44.5px; top: 6px; width: 16px; height: 16px; background: white; border: 4px solid var(--primary-blue); border-radius: 50%; }
        .pill { display: inline-block; background: rgba(0, 163, 173, 0.08); color: var(--primary-blue); padding: 5px 14px; border-radius: 50px; font-size: 0.8rem; margin: 4px; font-weight: 600; border: 1px solid rgba(0, 163, 173, 0.15); }
        .bar-bg { background: #E9ECEF; height: 10px; border-radius: 10px; margin-top: 12px; overflow: hidden; }
        .bar-fill { background: linear-gradient(90deg, var(--accent-teal), var(--primary-blue)); height: 100%; border-radius: 10px; }
        h2 { color: var(--primary-blue); font-size: 1.6rem; margin-top: 50px; border-bottom: 2px solid #eee; padding-bottom: 12px; }
    </style>
</head>
<body>
    <header class="hero">
        <div class="glass-card">
            <h1 style="margin:0; color: var(--primary-blue); font-size: 2.5rem;">Jack Chiang</h1>
            <p style="margin: 15px 0; color: #555;">📧 暫不顯示 | 📱 暫不顯示</p>
            <div style="margin-top:20px;">
                <span class="pill">ELISA</span><span class="pill">Cell Culture</span><span class="pill">PCR/qPCR</span><span class="pill">ISO 17025</span>
            </div>
        </div>
    </header>
    <main class="container">
        <h2>職涯歷程 / Experience</h2>
        <div class="timeline">
            <div class="timeline-item">
                <span style="color:var(--accent-teal); font-weight:700;">2020 - 2023</span>
                <h3 style="margin:5px 0 3px;">研發副組長</h3>
                <div style="font-weight:600; color:var(--primary-blue); margin-bottom:12px;">生技醫療器材公司</div>
                <ul><li>負責 IVD 體外診斷試劑開發。</li><li>成功通過 ISO 認證。</li></ul>
            </div>
        </div>
        <h2>重點專案 / Portfolio</h2>
        <div class="bento-grid">
            <div class="card">
                <small style="color:var(--accent-teal); font-weight:bold;">自動化系統</small>
                <h3 style="margin:10px 0 8px;">自動化檢測系統導入</h3>
                <div class="bar-bg"><div class="bar-fill" style="width: 95%;"></div></div>
            </div>
        </div>
    </main>
</body>
</html>
